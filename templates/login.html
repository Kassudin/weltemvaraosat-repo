{% extends "layout.html" %}
{% block title %}Kirjaudu{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12 p-6 bg-white rounded-lg shadow">
    <form action="/login" method="post" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700">Tunnus</label>
            <input type="text" name="username" class="mt-1 block w-full p-2 border border-blue-300 rounded-md" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Salasana</label>
            <input type="password" name="password" class="mt-1 block w-full p-2 border border-blue-300 rounded-md" required>
        </div>
        <div>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Kirjaudu</button>
        </div>
    </form>
</div>
{% endblock %}
