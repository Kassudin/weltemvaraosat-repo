{% extends "layout.html" %}
{% block title %}Etusivu{% endblock %}
{% block content %}
<div class="container-max mx-auto p-4 px-4 sm:px-6 lg:px-8 max-w-2xl">
  <div class="mb-6">
    <h2 class="font-semibold mb-2">Hae tuote:</h2>
    <input type="text" id="searchInput" placeholder="esim: polttoainesäiliön korkki"
           class="mt-1 block w-full p-2 border border-blue-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
  </div>
  <div>
    <h2 class="text-2xl font-semibold mb-2">Historia</h2>
    <table id="productTable" class="min-w-full border-collapse border border-gray"> 
      <tbody>
        {% for entry in history %}
        <tr class="hover:bg-gray-100">
          <td class="px-4 py-2 border border-blue-300 text-sm text-gray-700">{{ entry.change_date }}</td>
          <td class="px-4 py-2 border border-blue-300 text-sm text-gray-700">{{ entry.product_name }}</td>
          <td class="px-4 py-2 border border-blue-300 text-sm text-gray-700">{{ entry.old_amount}} -> {{ entry.new_amount }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('searchInput');
      const productTable = document.getElementById('productTable');
      const productRows = productTable.querySelectorAll('tbody tr');

      searchInput.addEventListener('keyup', function() {
        const query = searchInput.value.toLowerCase().trim();

        productRows.forEach((row) => {
          const nameCell = row.querySelector('td:nth-child(2)');
          if (nameCell) {
            const productName = nameCell.textContent.toLowerCase();
            if (productName.includes(query)) {
              row.style.display = '';
            } else {
              row.style.display = 'none';
            }
          }
        });
      });
    });
  </script>

{% endblock %}
