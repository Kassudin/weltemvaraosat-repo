{% extends "layout.html" %}
{% block title %}Lisää tuote{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12 p-6 bg-white rounded-lg shadow">
    <h1 class="text-2xl font-semibold mb-4">Lisää tuote</h1>
    <form action="/add_product" method="post" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700">Nimi</label>
            <input type="text" name="name" required class="mt-1 block w-full p-2 border border-blue-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Määrä</label>
            <input type="number" name="amount" required class="mt-1 block w-32 p-2 border border-blue-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div>
            <button type="submit" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Lisää</button>
            <a href="/" class="ml-4 text-sm text-gray-600 hover:underline">Peruuta</a>
        </div>
    </form>
</div>
{% endblock %}
